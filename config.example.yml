# =============================================================================
# CG DB-Writer — конфигурация
# Скопируйте в config.yml и заполните секреты.
# =============================================================================

# ---------- MQTT (aiomqtt) ---------------------------------------------------
mqtt:
  host: "localhost"
  port: 1883
  user: ""        # заполнить
  password: ""    # заполнить
  tls: false
  client_id: "cg-db-writer"
  keepalive: 60
  reconnect_min_delay: 1
  reconnect_max_delay: 60
  subscriptions:
    decoded:   "cg/v1/decoded/SN/+/pcc/+"
    telemetry: "cg/v1/telemetry/SN/+"

# ---------- PostgreSQL (asyncpg) ---------------------------------------------
postgres:
  host: "localhost"
  port: 5432
  dbname: "cg_telemetry"
  user: "cg_writer"
  password: "cg_dxrCthA1q0fR"
  pool_min: 2
  pool_max: 10

# ---------- Ingest pipeline (queues + workers) -------------------------------
ingest:
  # decoded — основной поток данных (много сообщений)
  decoded_queue_maxsize: 5000
  # telemetry — GPS/объект (редко, но важно)
  telemetry_queue_maxsize: 500

  # DB workers: по умолчанию 2 для лучшей обработки burst-нагрузки.
  # Если CPU/БД позволяют — 2..4, но тогда увеличьте postgres.pool_max.
  worker_count: 2

  # Если decoded очередь переполнится:
  drop_decoded_when_full: true
  drop_decoded_policy: "drop_oldest"   # drop_oldest | drop_new

  # Ретрай при временных ошибках БД
  worker_max_retries: 3
  worker_retry_delay_sec: 2.0

# ---------- GPS anti-teleport фильтр ----------------------------------------
gps_filter:
  sats_min: 4
  fix_min: 1
  deadband_m: 30
  max_jump_m: 500
  max_speed_kmh: 120
  confirm_points: 3
  confirm_radius_m: 50

# ---------- History policy ---------------------------------------------------
history_policy:
  defaults:
    tolerance_analog: 0.5
    min_interval_sec: 2       # было 10; для KPI регистров перекрывается ниже
    heartbeat_sec: 900        # 15 мин — дефолт для обычных регистров
    store_history: true
    value_kind: "analog"      # analog|discrete|counter|enum|text

  # KPI регистры — высокая частота, per-register настройки
  kpi_registers:
    - addr: 40034             # GensetTotal kW (Нагрузка)
      equip_type: "pcc"
      min_interval_sec: 0     # каждый пакет (ограничение только по tolerance)
      heartbeat_sec: 60
      tolerance: 0.5
    - addr: 40062             # OilPressure (Давление масла двигателя)
      equip_type: "pcc"
      min_interval_sec: 0
      heartbeat_sec: 60
      tolerance: 0.1
    - addr: 40070             # Наработка
      equip_type: "pcc"
      min_interval_sec: 5
      heartbeat_sec: 300
      tolerance: 1

# ---------- Events policy ----------------------------------------------------
events_policy:
  router_stale_sec: 120
  router_offline_sec: 300
  panel_stale_sec: 120
  panel_offline_sec: 300
  check_interval_sec: 30
  enable_gps_reject_events: true
  enable_unknown_register_events: true

# ---------- Retention (очистка) — только информационно ----------------------
# TimescaleDB Retention Policies устанавливаются в schema.sql через setup_db.py.
# Изменение значений здесь НЕ влияет на уже запущенные политики в БД.
# Для пересмотра политик пересоздайте схему: python scripts/setup_db.py --drop
retention:
  gps_raw_days: 3             # GPS raw: 3 суток
  history_raw_days: 30        # raw history: 30 дней
  history_1min_days: 30       # 1-мин агрегаты: 30 дней
  history_1hour_years: 1      # 1-час агрегаты: 1 год

# ---------- Health endpoint ---------------------------------------------------
health:
  enabled: true
  bind: "127.0.0.1"
  port: 8765

# ---------- Logging ----------------------------------------------------------
logging:
  level: "INFO"     # DEBUG | INFO | WARNING | ERROR
  log_file: ""      # пусто = только stdout
  json_logs: false
